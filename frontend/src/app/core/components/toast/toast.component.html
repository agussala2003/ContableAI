@for (toast of toastService.toasts(); track toast.id) {
  <div
    class="pointer-events-auto flex items-start gap-3 px-4 py-3.5 rounded-2xl max-w-sm w-full text-sm font-medium backdrop-blur-sm transition-all"
    [class]="variantClasses(toast.type)"
    [class.animate-slide-in-right]="!isLeaving(toast.id)"
    [class.animate-slide-out-right]="isLeaving(toast.id)"
    role="alert"
    aria-live="polite"
  >
    <!-- Colored leading bar -->
    <span
      class="absolute left-0 top-3 bottom-3 w-1 rounded-r-full"
      [class]="progressColorClass(toast.type)"
    ></span>

    <!-- Icon -->
    <div class="shrink-0 mt-0.5 ml-2" [class]="iconColorClass(toast.type)">
      @if (toast.type === 'success') {
        <lucide-icon name="circle-check" class="w-4 h-4" aria-hidden="true"></lucide-icon>
      } @else if (toast.type === 'warning') {
        <lucide-icon name="triangle-alert" class="w-4 h-4" aria-hidden="true"></lucide-icon>
      } @else {
        <lucide-icon name="circle-alert" class="w-4 h-4" aria-hidden="true"></lucide-icon>
      }
    </div>

    <!-- Message -->
    <span class="flex-1 leading-snug">{{ toast.message }}</span>

    <!-- Dismiss button -->
    <button
      (click)="dismiss(toast.id)"
      class="shrink-0 mt-0.5 p-0.5 rounded-md opacity-40 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/10 transition-all cursor-pointer"
      aria-label="Cerrar notificacion"
    >
      <lucide-icon name="x" class="w-3.5 h-3.5" aria-hidden="true"></lucide-icon>
    </button>
  </div>
}
