@if (open()) {
  <div class="fixed inset-0 z-40 bg-black/30 backdrop-blur-sm" (click)="close()"></div>

  <aside
    class="fixed top-0 right-0 z-50 h-full w-full max-w-md
           bg-white dark:bg-slate-900 shadow-2xl
           flex flex-col
           border-l border-slate-200 dark:border-slate-700/70
           animate-slide-in"
  >
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700/70">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white">{{ title() }}</h2>
      <button
        (click)="close()"
        class="w-8 h-8 flex items-center justify-center rounded-lg
               text-slate-400 hover:text-slate-600 dark:hover:text-slate-200
               hover:bg-slate-100 dark:hover:bg-slate-800
               transition-colors"
      >
        <lucide-icon name="x" class="w-5 h-5"></lucide-icon>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto px-6 py-6 space-y-5">
      <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1.5">
          Keyword <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          placeholder="Ej. RAPIPAGO, BBVA NET, SUELDO"
          [value]="form().keyword"
          (input)="onTextChange('keyword', $event)"
          class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                 bg-slate-50 dark:bg-slate-800
                 text-slate-900 dark:text-white text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
                 transition-all duration-150"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1.5">
          Cuenta Contable <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          placeholder="Escribi una cuenta..."
          [value]="form().targetAccount"
          (input)="onTextChange('targetAccount', $event)"
          class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                 bg-slate-50 dark:bg-slate-800
                 text-slate-900 dark:text-white text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
                 transition-all duration-150"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1.5">
          Direccion
        </label>
        <select
          [value]="form().direction ?? ''"
          (change)="onDirectionChange($event)"
          class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                 bg-slate-50 dark:bg-slate-800
                 text-slate-900 dark:text-white text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
                 transition-all duration-150"
        >
          <option value="">Ambas (Debito y Credito)</option>
          <option value="DEBIT">Debito (salidas)</option>
          <option value="CREDIT">Credito (entradas)</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1.5">
          Prioridad
        </label>
        <input
          type="number"
          min="1"
          max="999"
          [value]="form().priority"
          (input)="onPriorityChange($event)"
          class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                 bg-slate-50 dark:bg-slate-800
                 text-slate-900 dark:text-white text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
                 transition-all duration-150"
        />
      </div>

      <div class="flex items-start gap-3 p-4 rounded-xl bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/30">
        <input
          id="tax-matching"
          type="checkbox"
          [checked]="form().requiresTaxMatching"
          (change)="onTaxMatchingChange($event)"
          class="mt-0.5 w-4 h-4 rounded text-amber-500 border-amber-300 focus:ring-amber-500 cursor-pointer"
        />
        <div>
          <label for="tax-matching" class="text-sm font-semibold text-amber-800 dark:text-amber-300 cursor-pointer">
            Requiere cruce con AFIP
          </label>
          <p class="text-xs text-amber-600 dark:text-amber-400 mt-0.5">
            Activar solo para pagos AFIP que deben validarse contra el archivo de VEPs importado.
          </p>
        </div>
      </div>

      <div class="flex items-start gap-3 p-4 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-200 dark:border-indigo-500/30">
        <input
          id="retroactive-apply"
          type="checkbox"
          [checked]="applyRetroactive()"
          (change)="onApplyRetroactiveChange($event)"
          class="mt-0.5 w-4 h-4 rounded text-indigo-500 border-indigo-300 focus:ring-indigo-500 cursor-pointer"
        />
        <div>
          <label for="retroactive-apply" class="text-sm font-semibold text-indigo-800 dark:text-indigo-300 cursor-pointer">
            Aplicacion retroactiva automatica
          </label>
          <p class="text-xs text-indigo-600 dark:text-indigo-400 mt-0.5">
            Al guardar la regla, se reaplica sobre movimientos sin clasificar y sin asentar para la empresa activa.
          </p>
        </div>
      </div>
    </div>

    <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-700/70 flex items-center justify-end gap-3">
      <button
        (click)="close()"
        class="px-4 py-2 rounded-xl text-sm font-medium
               text-slate-600 dark:text-slate-300
               bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700
               hover:bg-slate-50 dark:hover:bg-slate-700
               transition-all duration-150 shadow-sm"
      >
        Cancelar
      </button>
      <button
        (click)="save()"
        [disabled]="isSaving() || !form().keyword.trim() || !form().targetAccount.trim()"
        class="inline-flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-semibold
               bg-indigo-600 hover:bg-indigo-500 text-white shadow-sm
               disabled:opacity-50 disabled:cursor-not-allowed
               transition-all duration-150"
      >
        @if (isSaving()) {
          <lucide-icon name="loader" class="w-4 h-4 animate-spin"></lucide-icon>
          Guardando...
        } @else {
          <lucide-icon name="check" class="w-4 h-4"></lucide-icon>
          {{ isEditing() ? 'Guardar cambios' : 'Crear regla' }}
        }
      </button>
    </div>
  </aside>
}
