<div class="flex-none mb-4 flex flex-col xl:flex-row xl:items-center xl:justify-between gap-3 animate-fade-in">
  <div class="flex items-center gap-2 min-w-0">
    <div class="relative min-w-[320px] max-w-[560px] flex-1 xl:flex-none xl:w-[420px]">
      <select
        [ngModel]="activeCompanyId() ?? ''"
        (ngModelChange)="onCompanyChange($event)"
        class="appearance-none w-full pl-3 pr-8 py-1.5 rounded-lg text-sm font-medium
               text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-800/50
               border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800
               focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-colors cursor-pointer"
      >
        @for (c of companies(); track c.id) {
          <option [value]="c.id">{{ c.name }}</option>
        }
      </select>
      <lucide-icon name="chevron-down" class="absolute right-1.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"></lucide-icon>
    </div>

    <button
      (click)="onManageCompaniesClick()"
      class="p-1.5 rounded-lg text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 transition-colors shrink-0"
      title="Gestionar empresas"
    >
      <lucide-icon name="building-2" class="w-4 h-4"></lucide-icon>
    </button>

    <span class="text-sm text-slate-500 dark:text-slate-400 whitespace-nowrap shrink-0">
      {{ rulesCount() }} regla{{ rulesCount() !== 1 ? 's' : '' }} definida{{ rulesCount() !== 1 ? 's' : '' }}
    </span>
  </div>

  <div class="flex items-center gap-2 flex-wrap xl:flex-nowrap">
    <div class="relative min-w-[240px]">
      <lucide-icon name="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></lucide-icon>
      <input
        type="text"
        placeholder="Buscar keyword o cuenta..."
        [value]="searchQuery()"
        (input)="onSearchInput($event)"
        [disabled]="!canCreate()"
        class="pl-9 pr-4 py-2 text-sm rounded-xl border border-slate-200 dark:border-slate-700
               bg-white dark:bg-slate-800
               text-slate-900 dark:text-white
               placeholder:text-slate-400 dark:placeholder:text-slate-500
               focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
               disabled:opacity-50 disabled:cursor-not-allowed
               transition-all duration-150 w-full"
      />
    </div>

    <select
      [ngModel]="filterType()"
      (ngModelChange)="filterTypeChange.emit($event)"
      [disabled]="!canCreate()"
      class="py-2 pl-3 pr-8 text-sm rounded-xl border border-slate-200 dark:border-slate-700
             bg-white dark:bg-slate-800
             text-slate-700 dark:text-slate-200
             focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
             disabled:opacity-50 disabled:cursor-not-allowed
             transition-all duration-150 cursor-pointer min-w-[160px]"
    >
      <option value="all">Todas</option>
      <option value="own">Solo propias</option>
      <option value="global">Solo generales</option>
    </select>

    <button
      (click)="onCreateClick()"
      [disabled]="!canCreate()"
      class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold
             bg-indigo-600 hover:bg-indigo-500 text-white shadow-sm
             disabled:opacity-40 disabled:cursor-not-allowed
             transition-all duration-150 whitespace-nowrap"
    >
      <lucide-icon name="plus" class="w-4 h-4"></lucide-icon>
      Nueva Regla
    </button>
  </div>
</div>
